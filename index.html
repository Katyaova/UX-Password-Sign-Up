<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale= 1.0" />
    <title> Password Sign Up Page</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="phone-screen">
        <section class="form-card">
        <h1>Create Account</h1>

        <input type="text" id="username" placeholder="Username" />
        <input type="password" id="password" placeholder="Enter Password" />

        <p id="passwordMessage" class="hidden">
            Your password must be atleast 8, characters long 
            and include a number, an uppercase letter, a lower case letter and a symbol.
        </p>



        <button id="signUpBtn">Sign Up</button>
        </section>
    </main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/zxcvbn/4.4.2/zxcvbn.js"></script>
<script src="script.js"></script>

</body>

</html>
