<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale= 1.0" />
    <title> Password Sign Up Page</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>Create Account</h1>

        <input type="text" id="username" placeholder="Username" />
        <input type="password" id="password" placeholder="Enter Password" />

        <div class="strenght-box">
            <p id ="strenghtText">Password Strenght: None</p>
            <div class="meter">
                <div id="meterFill"></div>
            </div>
            <p id="feedback"></p>
        </div>
    
        <div class="requirements">
            <p id="lengthReq"> At least 8 characters </p>
            <p id="caseReq"> includes uppercase & lowercase </p>
            <p id="numberReq"> Includes a number </p>
            <p id="symbolReq"> Includes a symbol </p>
        </div>

        <button id="continueBtn">Sign Up</button>

    </div>

    
</body>

</html>
